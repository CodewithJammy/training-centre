<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Check Your Future Ticket</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    header { text-align: center; margin-bottom: 20px; }
    nav { text-align: center; margin-bottom: 20px; }
    nav button { margin: 5px; padding: 10px 15px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background: #f4f4f4; }
    .actions label { margin: 0 5px; }
  </style>
</head>
<body>

<header>
  <h1>Check Your Future Ticket</h1>
</header>

<nav>
  <button onclick="showTab('stationTab')">By Stations</button>
  <button onclick="showTab('trainTab')">By Train No</button>
</nav>

<!-- Search by Start/End Stations -->
<div id="stationTab" style="display:block;">
  <label>Start Station:</label>
  <input type="text" id="startStation">
  <label>End Station:</label>
  <input type="text" id="endStation">
  <button onclick="searchByStations()">Search Trains</button>
</div>

<!-- Search by Train Number -->
<div id="trainTab" style="display:none;">
  <label>Train Number:</label>
  <input type="text" id="trainNo">
  <button onclick="searchByTrainNo()">Search Train</button>
</div>

<!-- Results -->
<div id="trainResults"></div>

<script>
function showTab(tabId) {
  document.getElementById("stationTab").style.display = "none";
  document.getElementById("trainTab").style.display = "none";
  document.getElementById(tabId).style.display = "block";
}

function searchByStations() {
  const start = document.getElementById("startStation").value;
  const end = document.getElementById("endStation").value;

  // Mock data for demo
  const trains = [
    { number: "12345", name: "Express A", chance: 80 },
    { number: "54321", name: "Express B", chance: 60 },
    { number: "67890", name: "Express C", chance: 40 }
  ];

  // Sort by decreasing chance
  trains.sort((a,b) => b.chance - a.chance);

  displayResults(trains);
}

function searchByTrainNo() {
  const trainNo = document.getElementById("trainNo").value;

  // Mock single train
  const trains = [
    { number: trainNo, name: "Selected Train", chance: 75 }
  ];

  displayResults(trains);
}

function displayResults(trains) {
  let html = "<table><tr><th>Train</th><th>Chance</th><th>Actions</th></tr>";
  trains.forEach(t => {
    html += `<tr>
      <td>${t.name} (${t.number})</td>
      <td>${t.chance}%</td>
      <td class="actions">
        <label><input type="radio" name="coach_${t.number}" value="Sleeper"> Sleeper</label>
        <label><input type="radio" name="coach_${t.number}" value="3AC"> 3AC</label>
        <label><input type="radio" name="coach_${t.number}" value="2AC"> 2AC</label>
        <button onclick="alert('Coach details for ${t.number}')">Coach Details</button>
        <button onclick="alert('Chance: ${t.chance}%')">Check Chance</button>
      </td>
    </tr>`;
  });
  html += "</table>";
  document.getElementById("trainResults").innerHTML = html;
}
</script>

</body>
</html>
