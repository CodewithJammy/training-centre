<!DOCTYPE html>
<html>
<head><title>Add Question</title></head>
<body>
  <h2>Add New Question</h2>
  <form method="POST">
    <label>Section:</label><input type="text" name="section" required><br><br>
    <label>Question Text:</label><textarea name="question_text"></textarea><br><br>
    <label>Question Image URL:</label><input type="text" name="question_image"><br><br>

    <h3>Options</h3>
    <input type="text" name="option_a_text" placeholder="Option A Text">
    <input type="text" name="option_a_image" placeholder="Option A Image URL"><br><br>
    <input type="text" name="option_b_text" placeholder="Option B Text">
    <input type="text" name="option_b_image" placeholder="Option B Image URL"><br><br>
    <input type="text" name="option_c_text" placeholder="Option C Text">
    <input type="text" name="option_c_image" placeholder="Option C Image URL"><br><br>
    <input type="text" name="option_d_text" placeholder="Option D Text">
    <input type="text" name="option_d_image" placeholder="Option D Image URL"><br><br>

    <label>Correct Option (A/B/C/D):</label><input type="text" name="correct_option" required><br><br>
    <button type="submit">Save Question</button>
  </form>
</body>
</html>
