<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Question</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    h3 {
      margin-top: 20px;
      color: #34495e;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      color: #2c3e50;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .option-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .option-group input {
      flex: 1;
    }
    button {
      background: #3498db;
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Add New Question</h2>
    <form method="POST" action="https://training-centre-proxy-hqhxcyfearcqayhw.centralindia-01.azurewebsites.net/admin/add-question">
      
      <label for="section">Section:</label>
      <select name="section" id="section" required>
        <option value="">-- Select Section --</option>
        <option value="Math">Math</option>
        <option value="Science">Science</option>
        <option value="English">English</option>
        <option value="General Knowledge">General Knowledge</option>
      </select>

      <label for="question_text">Question Text:</label>
      <textarea name="question_text" id="question_text"></textarea>

      <label for="question_image">Question Image URL:</label>
      <input type="text" name="question_image" id="question_image">

      <h3>Options</h3>
      <div class="option-group">
        <input type="text" name="option_a_text" placeholder="Option A Text">
        <input type="text" name="option_a_image" placeholder="Option A Image URL">
      </div>
      <div class="option-group">
        <input type="text" name="option_b_text" placeholder="Option B Text">
        <input type="text" name="option_b_image" placeholder="Option B Image URL">
      </div>
      <div class="option-group">
        <input type="text" name="option_c_text" placeholder="Option C Text">
        <input type="text" name="option_c_image" placeholder="Option C Image URL">
      </div>
      <div class="option-group">
        <input type="text" name="option_d_text" placeholder="Option D Text">
        <input type="text" name="option_d_image" placeholder="Option D Image URL">
      </div>

      <label for="correct_option">Correct Option:</label>
      <select name="correct_option" id="correct_option" required>
        <option value="">-- Select Correct Option --</option>
        <option value="A">Option A</option>
        <option value="B">Option B</option>
        <option value="C">Option C</option>
        <option value="D">Option D</option>
      </select>

      <button type="submit">Save Question</button>
    </form>
  </div>
</body>
</html>
