<!DOCTYPE html>
<html>
<head><title>All Questions</title></head>
<body>
  <h2>Saved Questions</h2>
  <table border="1">
    <tr><th>ID</th><th>Section</th><th>Question</th><th>Image</th><th>Correct</th></tr>
    {% for q in questions %}
    <tr>
      <td>{{ q.QuestionID }}</td>
      <td>{{ q.Section }}</td>
      <td>{{ q.QuestionText }}</td>
      <td>{% if q.QuestionImage %}<img src="{{ q.QuestionImage }}" width="100">{% endif %}</td>
      <td>{{ q.CorrectOption }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
