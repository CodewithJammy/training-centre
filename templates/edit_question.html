<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Question</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7f9; }
    .container { max-width: 700px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 8px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 15px; background: #3498db; color: #fff; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #2980b9; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Edit Question</h2>
    <form method="POST">
      <label>Section:</label>
      <input type="text" name="section" value="{{ question.Section }}">

      <label>Question Text:</label>
      <textarea name="question_text">{{ question.QuestionText }}</textarea>

      <label>Question Image URL:</label>
      <input type="text" name="question_image" value="{{ question.QuestionImage }}">

      <label>Option A:</label>
      <input type="text" name="option_a_text" value="{{ question.OptionAText }}">
      <input type="text" name="option_a_image" value="{{ question.OptionAImage }}">

      <label>Option B:</label>
      <input type="text" name="option_b_text" value="{{ question.OptionBText }}">
      <input type="text" name="option_b_image" value="{{ question.OptionBImage }}">

      <label>Option C:</label>
      <input type="text" name="option_c_text" value="{{ question.OptionCText }}">
      <input type="text" name="option_c_image" value="{{ question.OptionCImage }}">

      <label>Option D:</label>
      <input type="text" name="option_d_text" value="{{ question.OptionDText }}">
      <input type="text" name="option_d_image" value="{{ question.OptionDImage }}">

      <label>Correct Option:</label>
      <select name="correct_option">
        <option value="A" {% if question.CorrectOption == 'A' %}selected{% endif %}>A</option>
        <option value="B" {% if question.CorrectOption == 'B' %}selected{% endif %}>B</option>
        <option value="C" {% if question.CorrectOption == 'C' %}selected{% endif %}>C</option>
        <option value="D" {% if question.CorrectOption == 'D' %}selected{% endif %}>D</option>
      </select>

      <button type="submit">Update Question</button>
    </form>
  </div>
</body>
</html>
