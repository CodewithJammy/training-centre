<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Practice Portal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
    header, footer { background: #004080; color: white; text-align: center; padding: 5px; }
    .container { display: flex; }
    nav, aside { background: #e6e6e6; padding: 15px; }
    nav { width: 15%; border-right: 1px solid #ccc; }
    main { width: 70%; padding: 20px; background: white; }
    aside { width: 15%; border-left: 1px solid #ccc; }
    .question { margin-bottom: 20px; }
    .options label { display: block; margin: 5px 0; }
    .palette button {
      margin: 3px;
      padding: 5px 10px;
      border: none;
      background: #004080;
      color: white;
      cursor: pointer;
    }
    .palette button.active { background: orange; }
  </style>
</head>
<body>
  <header>
    <h3>Exam Practice Portal</h3>
    <p>Mock Test </p>
  </header>

  <div class="container">
    <nav>
      <h3>Sections</h3>
      <ul>
        <li><button onclick="loadSection('quant')">Quantitative Aptitude</button></li>
        <li><button onclick="loadSection('logical')">Logical Reasoning</button></li>
        <li><button onclick="loadSection('verbal')">Verbal Ability</button></li>
        <li><button onclick="loadSection('coding')">Coding</button></li>
      </ul>
    </nav>

    <main id="questionArea">
      <h3>Select a section to begin</h3>
    </main>

    <aside>
      <h3>Exam Info</h3>
      <p>Candidate: Jamshed</p>
      <p>Remaining Time: <span style="color:red;">01:45:30</span></p>
      <h4>Question Palette</h4>
      <div id="palette" class="palette"></div>
    </aside>
  </div>

  <footer>
    © 2026 Exam Practice | Powered by codewithjammy
  </footer>
<script>
  let currentSection = null;
  let currentIndex = 0;
  let sectionQuestions = [];
  let userResponses = {};

  function loadSection(section) {
    currentSection = section;
    currentIndex = 0;

    fetch(`/exam/questions/${section}`)
      .then(res => res.json())
      .then(data => {
        console.log("Fetched questions:", data);
        sectionQuestions = data.questions;
        const palette = document.getElementById('palette');
        const questionArea = document.getElementById('questionArea');
        palette.innerHTML = '';
        questionArea.innerHTML = `<h3>${section.toUpperCase()} Section</h3>`;

        sectionQuestions.forEach((q, i) => {
          const btn = document.createElement('button');
          btn.textContent = i + 1;
          btn.onclick = () => showQuestion(i);
          palette.appendChild(btn);
        });

        showQuestion(0);
      });
  }

  function showQuestion(index) {
    currentIndex = index;
    const q = sectionQuestions[index];
    const questionArea = document.getElementById('questionArea');

    let optionsHtml = "";
    for (const [key, opt] of Object.entries(q.options)) {
      optionsHtml += `<label>
        <input type="radio" name="q${q.id}" value="${key}" 
               onchange="saveResponse(${q.id}, '${key}')"> 
        ${opt.text ? opt.text : ""}
        ${opt.image ? `<img src="/static/images/${opt.image}" alt="Option ${key}" style="max-width:150px;">` : ""}
      </label>`;
    }

    questionArea.innerHTML = `
      <div class="question">
        <h3>${q.text ? q.text : ""}</h3>
        ${q.image ? `<img src="/static/images/${q.image}" alt="Question Image" style="max-width:300px;">` : ""}
        <div class="options">${optionsHtml}</div>
      </div>
      <button onclick="saveAndNext()">Save & Next</button>
      <button onclick="markForReview()">Mark for Review</button>
    `;
  }

  function saveResponse(qid, option) {
    userResponses[qid] = option;
    // mark palette button green when answered
    const paletteBtn = document.getElementById('palette').children[currentIndex];
    paletteBtn.style.background = "green";
  }

  function saveAndNext() {
    if (currentIndex < sectionQuestions.length - 1) {
      showQuestion(currentIndex + 1);
    } else {
      alert("End of section reached!");
    }
  }

  function markForReview() {
    const paletteBtn = document.getElementById('palette').children[currentIndex];
    paletteBtn.style.background = "orange";
    saveAndNext();
  }
</script>


</body>
</html>
