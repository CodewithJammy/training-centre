<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Practice Portal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
    header, footer { background: #004080; color: white; text-align: center; padding: 5px; }
    .container { display: flex; }
    nav, aside { background: #e6e6e6; padding: 15px; }
    nav { width: 15%; border-right: 1px solid #ccc; }
    main { width: 70%; padding: 20px; background: white; }
    aside { width: 15%; border-left: 1px solid #ccc; }
    .question { margin-bottom: 20px; }
    .options label { display: block; margin: 5px 0; }
    .palette button {
      margin: 3px;
      padding: 5px 10px;
      border: none;
      background: #004080;
      color: white;
      cursor: pointer;
    }
    .palette button.active { background: orange; }
  </style>
</head>
<body>
  <header>
    <h3>Exam Practice Portal</h3>
    <p>Mock Test </p>
  </header>

  <div class="container">
    <nav>
      <h3>Sections</h3>
      <ul>
        <li><button onclick="loadSection('quant')">Quantitative Aptitude</button></li>
        <li><button onclick="loadSection('logical')">Logical Reasoning</button></li>
        <li><button onclick="loadSection('verbal')">Verbal Ability</button></li>
        <li><button onclick="loadSection('coding')">Coding</button></li>
      </ul>
    </nav>

    <main id="questionArea">
      <h3>Select a section to begin</h3>
    </main>

    <aside>
      <h3>Exam Info</h3>
      <div id="userInfo">
    <!-- Will be populated dynamically -->
      </div>
      <p>Remaining Time: <span id="remainingTime" style="color:red;"></span></p>
      <h4>Question Palette</h4>
      <div id="palette" class="palette"></div>
      <button id="finishBtn" onclick="finishExam()" disabled>Finish Exam</button>
    </aside>
  </div>

  <footer>
    © 2026 Exam Practice | Powered by codewithjammy
  </footer>
<script>
  let currentSection = null;
  let currentIndex = 0;
  let sectionQuestions = [];
  let userResponses = {};

  function loadSection(section) {
    currentSection = section;
    currentIndex = 0;

    fetch(`/exam/questions/${section}`)
      .then(res => res.json())
      .then(data => {
        console.log("Fetched questions:", data);
        sectionQuestions = data.questions;
        const palette = document.getElementById('palette');
        const questionArea = document.getElementById('questionArea');
        palette.innerHTML = '';
        questionArea.innerHTML = `<h3>${section.toUpperCase()} Section</h3>`;

        sectionQuestions.forEach((q, i) => {
          const btn = document.createElement('button');
          btn.textContent = i + 1;
          btn.onclick = () => showQuestion(i);
          palette.appendChild(btn);
        });
        if (sectionQuestions.length > 0) {
            showQuestion(0);
        } else {
            questionArea.innerHTML += "<p>No questions found for this section.</p>";
        }
        // showQuestion(0);
      });
  }
 /*

    currentIndex = index;
    const q = sectionQuestions[index];
    const questionArea = document.getElementById('questionArea');

    let optionsHtml = "";

  */
  function showQuestion(index) {
  currentIndex = index;
  const q = sectionQuestions[index];
  const questionArea = document.getElementById('questionArea');

  // look up saved answer
  const savedAnswer = userResponses[currentSection]?.[q.id];

  let optionsHtml = "";
  for (const [key, opt] of Object.entries(q.options)) {
    const checked = savedAnswer === key ? "checked" : "";
    optionsHtml += `<label>
      <input type="radio" name="q${q.id}" value="${key}" ${checked}
             onchange="saveResponse('${currentSection}', ${q.id}, '${key}')"> 
      ${opt.text ? opt.text : ""}
      ${opt.image ? `<img src="/static/images/${opt.image}" alt="Option ${key}" style="max-width:150px;">` : ""}
    </label>`;
  }

  questionArea.innerHTML = `
    <div class="question">
      <h3>${q.text ? q.text : ""}</h3>
      ${q.image ? `<img src="/static/images/${q.image}" alt="Question Image" style="max-width:300px;">` : ""}
      <div class="options">${optionsHtml}</div>
    </div>
    <button onclick="saveAndNext()">Save & Next</button>
    <button onclick="markForReview()">Mark for Review</button>
  `;
}

  function saveResponse(section, qid, option) {
    if (!userResponses[section]) {
      userResponses[section] = {};
    }
    userResponses[section][qid] = option;

  // mark palette button green when answered
    const paletteBtn = document.getElementById('palette').children[currentIndex];
    paletteBtn.style.background = "green";
    }
 /* function saveResponse(qid, option) {
    userResponses[qid] = option;
    // mark palette button green when answered
    const paletteBtn = document.getElementById('palette').children[currentIndex];
    paletteBtn.style.background = "green";
  }*/

  function saveAndNext() {
    if (currentIndex < sectionQuestions.length - 1) {
      showQuestion(currentIndex + 1);
    } else {
      alert("End of section reached!");
    }
  }

 let markedQuestions = new Set();

function markForReview() {
  markedQuestions.add(currentIndex); // store the index
  updatePalette();
  saveAndNext();
}

function updatePalette() {
  const paletteBtns = document.getElementById('palette').children;
  for (let i = 0; i < paletteBtns.length; i++) {
    if (markedQuestions.has(i)) {
      paletteBtns[i].style.background = "orange";
    } else {
      paletteBtns[i].style.background = ""; // reset if not marked
    }
  }
}

  let examDuration = 0;       // in minutes, fetched from DB
  let examStartTime = null;
  let timerInterval = null;

  // Fetch user info + exam details at page load
  window.onload = function() {
    Promise.all([
      fetch('/exam/userinfo').then(res => res.json()),
      fetch('/exam/details').then(res => res.json())
    ]).then(([user, exam]) => {
      // User info
      document.getElementById('userInfo').innerHTML = `
        <p>Candidate: ${user.username}</p>
        <img src="${user.pic}" alt="Profile Pic" style="width:60px;height:60px;border-radius:50%;">
      `;

      // Exam details
      examDuration = exam.duration; // e.g. 60 minutes
      examStartTime = Date.now();
      startTimer();
    });
  };

  function startTimer() {
    const remainingTimeEl = document.getElementById('remainingTime');
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - examStartTime) / 1000); // seconds
      const remaining = examDuration * 60 - elapsed;

      if (remaining <= 0) {
        clearInterval(timerInterval);
        remainingTimeEl.textContent = "00:00:00";
        document.getElementById('finishBtn').disabled = false; // allow finish at end
        alert("Time is up! Please finish the exam.");
        return;
      }

      const hrs = String(Math.floor(remaining / 3600)).padStart(2, '0');
      const mins = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
      const secs = String(remaining % 60).padStart(2, '0');
      remainingTimeEl.textContent = `${hrs}:${mins}:${secs}`;

      // Enable finish button only after 60% time has passed
      const minAllowed = examDuration * 0.1 * 60; // seconds
      if (elapsed >= minAllowed) {
        document.getElementById('finishBtn').disabled = false;
      }
    }, 1000);
  }

  function finishExam() {
    clearInterval(timerInterval);
    alert("Exam finished! Submitting responses...");
    // send responses to backend
    fetch('/exam/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ responses: userResponses })
    }).then(res => res.json())
      .then(data => {
        console.log("Submission result:", data);
        alert("Exam submitted successfully!");
      });
  }

</script>


</body>
</html>
